<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      h1 {
        color: blue;
      }

      h2 {
        color: green;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
    <title>Lecture 01</title>
  </head>
  <body>
    <!-- Inline CSS -->
    <!-- Inline CSS allows you to apply styles directly within HTML tags using the style attribute -->

    <h1 style="color: red">CodeCraft Academy</h1>

    <!-- Internal CSS -->
    <!-- Internal CSS involves adding CSS styles directly within the HTML file by including them inside the <style> tags.  -->
    <h2>Abdul Shakoor Khan</h2>

    <!-- External CSS -->
    <!-- External CSS involves creating a separate CSS file with a .css extension and linking it to the HTML file using the <link> tag. -->

    <h3>External CSS</h3>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime sint cum
      quos ipsam optio exercitationem quam quasi iste, similique consequatur!
    </p>
  </body>
</html>
